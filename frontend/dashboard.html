<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <div class="container-fluid dashboard">
      <!-- HEADER -->

      <div
        class="navbar-custom d-flex justify-content-between align-items-center mb-4"
      >
        <div>
          <h3 class="mb-0 fw-bold">🎓 Student Management System</h3>

          <small> CRUD Mahasiswa Menggunakan JWT </small>
        </div>

        <button class="btn btn-danger logout-btn" onclick="logout()">
          Logout
        </button>
      </div>

      <!-- STATISTIK -->

      <div class="row mb-4">
        <div class="col-md-4">
          <div class="stats-card">
            <h6>Total Mahasiswa</h6>

            <div class="stats-number" id="totalStudent">0</div>
          </div>
        </div>
      </div>

      <!-- FORM -->

      <div class="card-modern p-4 mb-4">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h4 class="title">Data Mahasiswa</h4>

            <p class="subtitle">Kelola data mahasiswa</p>
          </div>

          <button
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#studentModal"
            onclick="resetForm()"
          >
            + Tambah Mahasiswa
          </button>
        </div>
      </div>

      <!-- TABLE -->

      <div class="card-modern p-4">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>ID</th>

              <th>Nama</th>

              <th>NIM</th>

              <th>Prodi</th>

              <th>Semester</th>

              <th width="180">Aksi</th>
            </tr>
          </thead>

          <tbody id="studentTable"></tbody>
        </table>
      </div>
    </div>

    <!-- MODAL -->

    <div class="modal fade" id="studentModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5>Mahasiswa</h5>

            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="studentId" />

            <div class="mb-3">
              <label class="form-label"> Nama </label>

              <input type="text" id="nama" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label"> NIM </label>

              <input type="text" id="nim" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label"> Program Studi </label>

              <input type="text" id="prodi" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label"> Semester </label>

              <input type="number" id="semester" class="form-control" />
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Batal
            </button>

            <button class="btn btn-primary" onclick="saveStudent()">
              Simpan
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="assets/js/config.js"></script>

    <script src="assets/js/auth.js"></script>

    <script src="assets/js/student.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
